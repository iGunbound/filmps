  <style>
    body { margin: 0; font-family: sans-serif; background: #000; color: #fff; }
    #video-container { position: relative; width: 100%; max-width: 100%; background: #000; }
    video { width: 100%; height: auto; background: #000; }
    #controls { margin: 10px; text-align: center; }
    #episode-list { display: flex; flex-wrap: wrap; padding: 10px; gap: 5px; justify-content: center; }
    .episode-btn {
      padding: 8px 12px; background: #444; border: none; color: #fff;
      cursor: pointer; border-radius: 4px;
    }
    .episode-btn.active { background: #d00; }
    .skip-btn {
      padding: 5px 10px;
      margin: 5px;
      font-size: 14px;
      border: none;
      border-radius: 3px;
      background: #333;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

    <div id="controls">
      <button class="skip-btn" onclick="skip(-30)">⏪ 30s</button>
      <button class="skip-btn" onclick="skip(30)">⏩ 30s</button>
    </div>
  </div>
  <div id="episode-list"></div>

      "https://s3.phim1280.tv/20240603/BmtydOPD/index.m3u8"
    ];

    const video = document.getElementById('video');
    let currentEpisode = 0;

    function loadEpisode(index) {
      currentEpisode = index;
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(episodes[index]);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = episodes[index];
        video.play();
      }
      document.querySelectorAll('.episode-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
    }

    function skip(seconds) {
      video.currentTime += seconds;
    }

    function createEpisodeButtons() {
      const list = document.getElementById('episode-list');
      episodes.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.textContent = `Tập ${i + 1}`;
        btn.className = 'episode-btn';
        btn.onclick = () => loadEpisode(i);
        list.appendChild(btn);
      });
    }

    video.addEventListener('ended', () => {
      if (currentEpisode + 1 < episodes.length) loadEpisode(currentEpisode + 1);
    });

    createEpisodeButtons();
    loadEpisode(0);
