  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #video-container { position: relative; max-width: 100%; overflow: hidden; }
    #playlist { max-height: 300px; overflow-y: auto; background: #111; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
    .episode { cursor: pointer; padding: 5px 10px; background: #333; border-radius: 4px; }
    .episode.active { background: #d00; color: #fff; }
    #controls { position: absolute; top: 10px; left: 10px; z-index: 2; }
    .ctrl-btn { background: rgba(0,0,0,0.5); border: none; color: white; padding: 6px 10px; margin: 0 5px; cursor: pointer; border-radius: 4px; }

    /* ZOOM */
    #video {

      transition: transform 0.25s ease;

let current = 0;
const video = document.getElementById("video");
const playlist = document.getElementById("playlist");

/* LOAD EPISODE */
function loadEpisode(index) {
  current = index;
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(episodes[index].url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = episodes[index].url;
    video.play();
  }
  updatePlaylistUI();
}

/* PLAYLIST */
function updatePlaylistUI() {
  playlist.innerHTML = '';
  episodes.forEach((ep, i) => {
    const btn = document.createElement("div");
    btn.className = "episode" + (i === current ? " active" : "");
    btn.innerText = ep.title;
    btn.onclick = () => loadEpisode(i);
    playlist.appendChild(btn);
  });
}

/* SEEK */
function seek(seconds) {
  video.currentTime += seconds;
}

/* AUTO NEXT */
video.addEventListener("ended", () => {
  if (current + 1 < episodes.length) loadEpisode(current + 1);
});

/* ZOOM LOGIC */
let zoomLevel = 1;
const ZOOM_STEP = 0.1;
const ZOOM_MIN = 1;
const ZOOM_MAX = 2;

function applyZoom() {
  video.style.transform = `scale(${zoomLevel})`;
}

function zoomIn() {
  zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP);
  applyZoom();
}

function zoomOut() {
  zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP);
  applyZoom();
}

loadEpisode(0);
