];

let current = 0;
const player = document.getElementById('player');
const playlist = document.getElementById('playlist');
let hls = null;

function renderPlaylist(){
  playlist.innerHTML='';
  episodes.forEach((ep, i) => {
    const d = document.createElement('div');
    d.className = 'ep' + (i===current ? ' active' : '');
    d.textContent = ep.title;
    d.onclick = () => playIndex(i);
    playlist.appendChild(d);
  });
}

function destroyHls(){ if (hls) { try { hls.destroy(); } catch(e){console.warn(e)} hls = null; } player.src = ''; }

function playIndex(i){
  current = i;
  destroyHls();
  const url = episodes[i].url;
  if (Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){ player.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, function(event, data){ console.warn('HLS error', data); });
  } else if (player.canPlayType('application/vnd.apple.mpegurl')){
    player.src = url;
    player.play().catch(()=>{});
  }
  renderPlaylist();
}

// Auto-next when ended
player.addEventListener('ended', function(){ if (current+1 < episodes.length) playIndex(current+1); });

// Render and autoplay first episode
renderPlaylist();
playIndex(0);
