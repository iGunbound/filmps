  <meta charset="UTF-8">
  <title>Video Player</title>
  <style>
    body { background: #000; margin: 0; color: white; font-family: Arial, sans-serif; }
    #video-container { position: relative; }
    video { width: 100%; height: auto; }
    #playlist { display: flex; flex-wrap: wrap; background: #111; padding: 10px; gap: 5px; }
    .episode { padding: 6px 10px; background: #333; border-radius: 4px; cursor: pointer; }
    .episode.active { background: red; }
  </style>
</head>

];

    const video = document.getElementById("video");
    const playlist = document.getElementById("playlist");
    let current = 0;

    function loadEpisode(index) {
      current = index;
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(episodes[index].url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = episodes[index].url;
        video.play();
      }
      renderPlaylist();
    }

    function renderPlaylist() {
      playlist.innerHTML = '';
      episodes.forEach((ep, i) => {
        const div = document.createElement('div');
        div.className = 'episode' + (i === current ? ' active' : '');
        div.textContent = ep.title;
        div.onclick = () => loadEpisode(i);
        playlist.appendChild(div);
      });
    }

    loadEpisode(0);
  </script>
</body>
