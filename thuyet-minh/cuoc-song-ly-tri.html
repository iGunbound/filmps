<style>

}
</style>

<script>
let video = document.getElementById("video");
let episodeList = document.getElementById("episode-list");
let wrapper = document.getElementById("videoContainer");
let overlay = document.getElementById("controlsOverlay");

let episodes = [];
let currentIndex = 0;
let hls;
let hideTimeout;

/* PARSE EPISODES */
function parseEpisodes(){
let lines = rawEpisodes.trim().split("\n");
lines.forEach(line=>{
let parts = line.split("|");
if(parts.length===2){
episodes.push({
title: parts[0].trim(),
url: parts[1].trim()
});
}
});
renderEpisodes();
loadEpisode(0);
}

function renderEpisodes(){
episodeList.innerHTML="";
episodes.forEach((ep,index)=>{
let btn=document.createElement("button");
btn.textContent=ep.title;
btn.onclick=()=>loadEpisode(index);
if(index===0) btn.classList.add("active");
episodeList.appendChild(btn);
});
}

function loadEpisode(index){
currentIndex=index;

document.querySelectorAll("#episode-list button")
.forEach(btn=>btn.classList.remove("active"));
document.querySelectorAll("#episode-list button")[index]
.classList.add("active");

if(hls){ hls.destroy(); }

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(episodes[index].url);
hls.attachMedia(video);
}else{
video.src=episodes[index].url;
}

video.play();
}

function nextEpisode(){
if(currentIndex < episodes.length-1){
loadEpisode(currentIndex+1);
}
}

function prevEpisode(){
if(currentIndex > 0){
loadEpisode(currentIndex-1);
}
}

video.addEventListener("ended",()=>{
nextEpisode();
});

function skip(seconds){
video.currentTime += seconds;
}

/* FULLSCREEN */
function toggleFull(){
if(!document.fullscreenElement){
wrapper.requestFullscreen();
}else{
document.exitFullscreen();
}
}

/* CINEMA MODE */
function toggleCinema(){
wrapper.classList.toggle("cinema-mode");
document.body.style.overflow =
wrapper.classList.contains("cinema-mode") ? "hidden" : "auto";
}

/* AUTO HIDE AFTER 3s */
function showControls(){
overlay.classList.remove("controls-hidden");
clearTimeout(hideTimeout);
hideTimeout = setTimeout(()=>{
overlay.classList.add("controls-hidden");
},3000);
}

wrapper.addEventListener("mousemove", showControls);
wrapper.addEventListener("touchstart", showControls);

parseEpisodes();
showControls();
</script>
