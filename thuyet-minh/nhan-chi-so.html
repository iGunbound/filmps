<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trình phát video</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #video-container { position: relative; max-width: 100%; }
    #playlist { max-height: 300px; overflow-y: auto; background: #111; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
    .episode { cursor: pointer; padding: 5px 10px; background: #333; border-radius: 4px; }
    .episode.active { background: #d00; color: #fff; }
    #controls { position: absolute; top: 10px; left: 10px; z-index: 2; }
    .ctrl-btn { background: rgba(0,0,0,0.5); border: none; color: white; padding: 6px 10px; margin: 0 5px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" controls autoplay playsinline width="100%" height="auto"></video>
    <div id="controls">
      <button class="ctrl-btn" onclick="seek(-30)">⏪ 30s</button>
      <button class="ctrl-btn" onclick="seek(30)">30s ⏩</button>
    </div>
  </div>
  <div id="playlist"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
const episodes = [
  { title: 'Tập 01', url: 'https://s6.kkphimplayer6.com/20251231/fT2exh51/index.m3u8' },
  { title: 'Tập 02', url: 'https://s6.kkphimplayer6.com/20251231/xDOv6QEj/index.m3u8' },
  { title: 'Tập 03', url: 'https://s6.kkphimplayer6.com/20251231/S4GP5VR4/index.m3u8' },
  { title: 'Tập 04', url: 'https://s6.kkphimplayer6.com/20251231/rlu5GnaO/index.m3u8' },
  { title: 'Tập 05', url: 'https://s6.kkphimplayer6.com/20251231/sQQeuVSv/index.m3u8' },
  { title: 'Tập 06', url: 'https://s6.kkphimplayer6.com/20251231/UBedWkz2/index.m3u8' },
  { title: 'Tập 07', url: 'https://s6.kkphimplayer6.com/20251231/G3v90St7/index.m3u8' },
  { title: 'Tập 08', url: 'https://s6.kkphimplayer6.com/20251231/F8dPGwz1/index.m3u8' },
  { title: 'Tập 09', url: 'https://s6.kkphimplayer6.com/20260102/vuBol6jt/index.m3u8' },
  { title: 'Tập 10', url: 'https://s6.kkphimplayer6.com/20260105/cqkOf5Ib/index.m3u8' },
  { title: 'Tập 11', url: 'https://s6.kkphimplayer6.com/20260105/ahzwQ8lI/index.m3u8' },
  { title: 'Tập 12', url: 'https://s6.kkphimplayer6.com/20260105/U6CUO31u/index.m3u8' },
  { title: 'Tập 13', url: 'https://s6.kkphimplayer6.com/20260106/ullL0bko/index.m3u8' },
  { title: 'Tập 14', url: 'https://s6.kkphimplayer6.com/20260107/YHBmpVts/index.m3u8' },
  { title: 'Tập 15', url: 'https://s6.kkphimplayer6.com/20260108/bAYldtxT/index.m3u8' },
  { title: 'Tập 16', url: 'https://s6.kkphimplayer6.com/20260109/unlal5ck/index.m3u8' },
  { title: 'Tập 17', url: 'https://s6.kkphimplayer6.com/20260110/AvnWxSJG/index.m3u8' },
  { title: 'Tập 18', url: 'https://s6.kkphimplayer6.com/20260112/6o9DLpDI/index.m3u8' },
];

    let current = 0;
    const video = document.getElementById("video");
    const playlist = document.getElementById("playlist");

    function loadEpisode(index) {
      current = index;
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(episodes[index].url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = episodes[index].url;
        video.play();
      }
      updatePlaylistUI();
    }

    function updatePlaylistUI() {
      playlist.innerHTML = '';
      episodes.forEach((ep, i) => {
        const btn = document.createElement("div");
        btn.className = "episode" + (i === current ? " active" : "");
        btn.innerText = ep.title;
        btn.onclick = () => loadEpisode(i);
        playlist.appendChild(btn);
      });
    }

    function seek(seconds) {
      video.currentTime += seconds;
    }

    video.addEventListener("ended", () => {
      if (current + 1 < episodes.length) loadEpisode(current + 1);
    });

    loadEpisode(0);
  </script>
</body>
</html>
