<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
#player-wrapper{max-width:1200px;margin:auto;}
.video-container{position:relative;width:100%;background:#000;overflow:hidden;}
video{width:100%;background:#000;}

.controls-overlay{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
display:flex;gap:8px;
background:rgba(0,0,0,0.6);
padding:10px;border-radius:10px;
transition:opacity .3s;
flex-wrap:wrap;
}
.controls-overlay button{
background:#111;color:#fff;border:none;
padding:8px 12px;cursor:pointer;border-radius:6px;
font-size:13px;
}
.controls-hidden{opacity:0;pointer-events:none;}

#episode-list{
display:flex;flex-wrap:wrap;gap:8px;
padding:15px 0;justify-content:center;
}
#episode-list button{
padding:8px 14px;background:#222;color:#fff;
border:none;cursor:pointer;border-radius:4px;
}
#episode-list button.active{background:#e50914;}

.skip-notice{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:#fff;padding:10px 20px;
border-radius:8px;font-size:14px;
opacity:0;transition:opacity .3s;
pointer-events:none;
}
.skip-notice.show{opacity:1;}

/* CINEMA MODE */
.cinema-mode{
position:fixed!important;
top:0;
left:0;
width:100vw!important;
height:100vh!important;
background:#000;
z-index:99999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.cinema-mode video{
width:100vw!important;
height:100vh!important;
object-fit:contain;
}
.cinema-mode #episode-list{
position:absolute;
bottom:0;
background:rgba(0,0,0,0.85);
width:100%;
padding:15px;
}
</style>

<script>
let video=document.getElementById("video");
let episodeList=document.getElementById("episode-list");
let wrapper=document.getElementById("videoContainer");
let overlay=document.getElementById("controlsOverlay");
let skipNotice=document.getElementById("skipNotice");
let autoSkipBtn=document.getElementById("autoSkipBtn");

let episodes=[];
let currentIndex=0;
let hls;
let hideTimeout;

/* ===== SKIP SETTINGS ===== */
const skipIntroSeconds=68;
const skipOutroSeconds=68;
const midSkipStart=890;
const midSkipDuration=38;
/* ========================== */

let introSkipped=false;
let midSkipped=false;
let autoSkipEnabled=true;

/* ===== CORE FUNCTIONS ===== */

function showNotice(text){
skipNotice.textContent=text;
skipNotice.classList.add("show");
setTimeout(()=>skipNotice.classList.remove("show"),2000);
}

function toggleAutoSkip(){
autoSkipEnabled=!autoSkipEnabled;
autoSkipBtn.textContent=
autoSkipEnabled?"⏩ AutoSkip: ON":"⏹ AutoSkip: OFF";
showNotice(autoSkipEnabled?"AutoSkip bật":"AutoSkip tắt");
}

function parseEpisodes(){
episodes=[];
let lines=rawEpisodes.trim().split("\n");
lines.forEach(line=>{
let parts=line.split("|");
if(parts.length===2){
episodes.push({title:parts[0].trim(),url:parts[1].trim()});
}
});
renderEpisodes();
loadEpisode(0);
}

function renderEpisodes(){
episodeList.innerHTML="";
episodes.forEach((ep,index)=>{
let btn=document.createElement("button");
btn.textContent=ep.title;
btn.onclick=()=>loadEpisode(index);
if(index===0) btn.classList.add("active");
episodeList.appendChild(btn);
});
}

function loadEpisode(index){
currentIndex=index;
introSkipped=false;
midSkipped=false;

document.querySelectorAll("#episode-list button")
.forEach(btn=>btn.classList.remove("active"));
document.querySelectorAll("#episode-list button")[index]
.classList.add("active");

if(hls){hls.destroy();}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(episodes[index].url);
hls.attachMedia(video);
}else{
video.src=episodes[index].url;
}

video.play();
}

function nextEpisode(){
if(currentIndex<episodes.length-1)
loadEpisode(currentIndex+1);
}

function prevEpisode(){
if(currentIndex>0)
loadEpisode(currentIndex-1);
}

function skip(sec){
video.currentTime+=sec;
}

function toggleFull(){
if(!document.fullscreenElement){
wrapper.requestFullscreen();
}else{
document.exitFullscreen();
}
}

function toggleCinema(){
wrapper.classList.toggle("cinema-mode");
document.body.style.overflow=
wrapper.classList.contains("cinema-mode")?"hidden":"auto";
}

/* ===== AUTO SKIP LOGIC ===== */

video.addEventListener("loadedmetadata",()=>{
if(autoSkipEnabled && skipIntroSeconds>0){
video.currentTime=skipIntroSeconds;
}
});

video.addEventListener("timeupdate",()=>{
if(!autoSkipEnabled) return;

if(!midSkipped &&
video.currentTime>=midSkipStart &&
video.currentTime<=midSkipStart+midSkipDuration){
video.currentTime=midSkipStart+midSkipDuration;
midSkipped=true;
showNotice("⏩ Đã bỏ quảng cáo");
}

if(video.duration &&
video.currentTime>=video.duration-skipOutroSeconds){
nextEpisode();
}
});

video.addEventListener("ended",()=>{
nextEpisode();
});

/* ===== AUTO HIDE CONTROLS ===== */
function showControls(){
overlay.classList.remove("controls-hidden");
clearTimeout(hideTimeout);
hideTimeout=setTimeout(()=>{
overlay.classList.add("controls-hidden");
},3000);
}
wrapper.addEventListener("mousemove",showControls);
wrapper.addEventListener("touchstart",showControls);

/* ===== KEYBOARD ===== */
document.addEventListener("keydown",(e)=>{
if(e.target.tagName==="INPUT") return;

switch(e.key.toLowerCase()){
case "arrowleft": skip(-30); break;
case "arrowright": skip(30); break;
case " ": e.preventDefault();
video.paused?video.play():video.pause();
break;
case "f": toggleFull(); break;
case "c": toggleCinema(); break;
case "a": toggleAutoSkip(); break;
case "n": nextEpisode(); break;
case "p": prevEpisode(); break;
}
});

/* INIT */
parseEpisodes();
showControls();
</script>
