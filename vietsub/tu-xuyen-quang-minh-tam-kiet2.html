<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trình phát video</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #video-container { position: relative; max-width: 100%; }
    #playlist { max-height: 300px; overflow-y: auto; background: #111; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
    .episode { cursor: pointer; padding: 5px 10px; background: #333; border-radius: 4px; }
    .episode.active { background: #d00; color: #fff; }
    #controls { position: absolute; top: 10px; left: 10px; z-index: 2; }
    .ctrl-btn { background: rgba(0,0,0,0.5); border: none; color: white; padding: 6px 10px; margin: 0 5px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" controls autoplay playsinline width="100%" height="auto"></video>
    <div id="controls">
      <button class="ctrl-btn" onclick="seek(-30)">⏪ 30s</button>
      <button class="ctrl-btn" onclick="seek(30)">30s ⏩</button>
    </div>
  </div>
  <div id="playlist"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const episodes = [
  { title: 'Tập 01', url: 'https://s6.kkphimplayer6.com/20250530/wXH0S6V8/index.m3u8' },
  { title: 'Tập 02', url: 'https://s6.kkphimplayer6.com/20250530/SKouKkBt/index.m3u8' },
  { title: 'Tập 03', url: 'https://s6.kkphimplayer6.com/20250530/QkcRY8Rg/index.m3u8' },
  { title: 'Tập 04', url: 'https://s6.kkphimplayer6.com/20250530/hbgYOJc8/index.m3u8' },
  { title: 'Tập 05', url: 'https://s6.kkphimplayer6.com/20250531/jdHqgxRL/index.m3u8' },
  { title: 'Tập 06', url: 'https://s6.kkphimplayer6.com/20250531/zMvd98S1/index.m3u8' },
  { title: 'Tập 07', url: 'https://s6.kkphimplayer6.com/20250601/mS4mnPFW/index.m3u8' },
  { title: 'Tập 08', url: 'https://s6.kkphimplayer6.com/20250601/nkSVct1x/index.m3u8' },
  { title: 'Tập 09', url: 'https://s6.kkphimplayer6.com/20250602/J9pmDGdn/index.m3u8' },
  { title: 'Tập 10', url: 'https://s6.kkphimplayer6.com/20250602/nIfy5eSh/index.m3u8' },
  { title: 'Tập 11', url: 'https://s6.kkphimplayer6.com/20250603/1WjpdZGR/index.m3u8' },
  { title: 'Tập 12', url: 'https://s6.kkphimplayer6.com/20250603/LZfgY0tJ/index.m3u8' },
  { title: 'Tập 13', url: 'https://s6.kkphimplayer6.com/20250604/YUG07HPK/index.m3u8' },
  { title: 'Tập 14', url: 'https://s6.kkphimplayer6.com/20250604/H9T8CD3X/index.m3u8' },
  { title: 'Tập 15', url: 'https://s6.kkphimplayer6.com/20250605/HhgZhSlj/index.m3u8' },
  { title: 'Tập 16', url: 'https://s6.kkphimplayer6.com/20250605/DcptBqac/index.m3u8' },
  { title: 'Tập 17', url: 'https://s6.kkphimplayer6.com/20250607/Klzh8auC/index.m3u8' },
  { title: 'Tập 18', url: 'https://s6.kkphimplayer6.com/20250607/y97AjM1z/index.m3u8' },
  { title: 'Tập 19', url: 'https://s6.kkphimplayer6.com/20250607/8GcGQCrq/index.m3u8' },
  { title: 'Tập 20', url: 'https://s6.kkphimplayer6.com/20250607/DrhPyHBJ/index.m3u8' },
  { title: 'Tập 21', url: 'https://s6.kkphimplayer6.com/20250607/HBVetVJ4/index.m3u8' },
  { title: 'Tập 22', url: 'https://s6.kkphimplayer6.com/20250607/ZwuSXKQd/index.m3u8' },
  { title: 'Tập 23', url: 'https://s6.kkphimplayer6.com/20250607/mavXYL81/index.m3u8' },
  { title: 'Tập 24', url: 'https://s6.kkphimplayer6.com/20250607/HDqonqZF/index.m3u8' }
];

    let current = 0;
    const video = document.getElementById("video");
    const playlist = document.getElementById("playlist");

    function loadEpisode(index) {
      current = index;
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(episodes[index].url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = episodes[index].url;
        video.play();
      }
      updatePlaylistUI();
    }

    function updatePlaylistUI() {
      playlist.innerHTML = '';
      episodes.forEach((ep, i) => {
        const btn = document.createElement("div");
        btn.className = "episode" + (i === current ? " active" : "");
        btn.innerText = ep.title;
        btn.onclick = () => loadEpisode(i);
        playlist.appendChild(btn);
      });
    }

    function seek(seconds) {
      video.currentTime += seconds;
    }

    video.addEventListener("ended", () => {
      if (current + 1 < episodes.length) loadEpisode(current + 1);
    });

    loadEpisode(0);
  </script>
</body>
</html>
