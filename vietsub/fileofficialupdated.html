<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trình phát video</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #video-container { position: relative; max-width: 100%; }
    #playlist { max-height: 300px; overflow-y: auto; background: #111; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
    .episode { cursor: pointer; padding: 5px 10px; background: #333; border-radius: 4px; }
    .episode.active { background: #d00; color: #fff; }
    #controls { position: absolute; top: 10px; left: 10px; z-index: 2; }
    .ctrl-btn { background: rgba(0,0,0,0.5); border: none; color: white; padding: 6px 10px; margin: 0 5px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" controls autoplay playsinline width="100%" height="auto"></video>
    <div id="controls">
      <button class="ctrl-btn" onclick="seek(-30)">⏪ 30s</button>
      <button class="ctrl-btn" onclick="seek(30)">30s ⏩</button>
    </div>
  </div>
  <div id="playlist"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const episodes = [
  { title: 'Tập 01', url: 'https://s6.kkphimplayer6.com/20250801/hH0a8Fxr/index.m3u8' },
  { title: 'Tập 02', url: 'https://s6.kkphimplayer6.com/20250801/QK2LwQOR/index.m3u8' },
  { title: 'Tập 03', url: 'https://s6.kkphimplayer6.com/20250803/VNSFiUdg/index.m3u8' },
  { title: 'Tập 04', url: 'https://s6.kkphimplayer6.com/20250803/eXWiSiCc/index.m3u8' },
  { title: 'Tập 05', url: 'https://s6.kkphimplayer6.com/20250803/ZiblJTTq/index.m3u8' },
  { title: 'Tập 06', url: 'https://s6.kkphimplayer6.com/20250803/u1YWR5uv/index.m3u8' },
  { title: 'Tập 07', url: 'https://s6.kkphimplayer6.com/20250804/2gLLBRlt/index.m3u8' },
  { title: 'Tập 08', url: 'https://s6.kkphimplayer6.com/20250804/Bpo7CoSH/index.m3u8' },
  { title: 'Tập 01', url: 'https://s6.kkphimplayer6.com/20250806/cKcDIJVb/index.m3u8' },
  { title: 'Tập 02', url: 'https://s6.kkphimplayer6.com/20250806/Gmw2hhEL/index.m3u8' },
  { title: 'Tập 03', url: 'https://s6.kkphimplayer6.com/20250806/hpLNbThO/index.m3u8' },
  { title: 'Tập 04', url: 'https://s6.kkphimplayer6.com/20250806/CAzdbM6C/index.m3u8' },
  { title: 'Tập 05', url: 'https://s6.kkphimplayer6.com/20250807/Eso3y9Na/index.m3u8' },
  { title: 'Tập 06', url: 'https://s6.kkphimplayer6.com/20250807/hFrQNRHq/index.m3u8' },
  { title: 'Tập 07', url: 'https://s6.kkphimplayer6.com/20250808/o9s44SGG/index.m3u8' },
  { title: 'Tập 08', url: 'https://s6.kkphimplayer6.com/20250808/V3j3t3qn/index.m3u8' }
];

    let current = 0;
    const video = document.getElementById("video");
    const playlist = document.getElementById("playlist");

    function loadEpisode(index) {
      current = index;
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(episodes[index].url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = episodes[index].url;
        video.play();
      }
      updatePlaylistUI();
    }

    function updatePlaylistUI() {
      playlist.innerHTML = '';
      episodes.forEach((ep, i) => {
        const btn = document.createElement("div");
        btn.className = "episode" + (i === current ? " active" : "");
        btn.innerText = ep.title;
        btn.onclick = () => loadEpisode(i);
        playlist.appendChild(btn);
      });
    }

    function seek(seconds) {
      video.currentTime += seconds;
    }

    video.addEventListener("ended", () => {
      if (current + 1 < episodes.length) loadEpisode(current + 1);
    });

    loadEpisode(0);
  </script>
</body>
</html>
