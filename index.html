<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONG Movie</title>

<!-- ICON -->
<link rel="icon" type="image/png" href="images/hot/play.png">
<link rel="apple-touch-icon" href="images/hot/play.png">
<meta name="theme-color" content="#000000">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f0f0f;
    color:#fff;
}

/* HEADER */
header{
    background:#000;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff2d2d;
}

/* SEARCH */
.search-box{
    position:relative;
}
.search-box input{
    padding:8px 40px 8px 15px;
    border-radius:20px;
    border:none;
    outline:none;
}
.search-box svg{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    stroke:#777;
    pointer-events:none;
}

/* SLIDER */
.slider-section{
    padding:30px;
}
.slider-wrapper{
    overflow:hidden;
}
.slider-track{
    display:flex;
    gap:20px;
    animation:slide 30s linear infinite;
}
.slider-item{
    min-width:20%;
    border-radius:15px;
    overflow:hidden;
}
.slider-item img{
    width:100%;
    height:380px;
    object-fit:cover;
    border-radius:15px;
}
@keyframes slide{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* TITLE + MARQUEE */
.title-row{
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px 30px;
}

.section-title{
    font-size:24px;
}

/* MARQUEE 1 CHIỀU CHẬM */
.marquee-box{
    width:420px;
    height:34px;
    border:2px solid #ff2d2d;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    align-items:center;
    position:relative;
}

/* Fade 2 đầu */
.marquee-box::before,
.marquee-box::after{
    content:"";
    position:absolute;
    top:0;
    width:50px;
    height:100%;
    z-index:2;
    pointer-events:none;
}
.marquee-box::before{
    left:0;
    background:linear-gradient(to right,#0f0f0f,transparent);
}
.marquee-box::after{
    right:0;
    background:linear-gradient(to left,#0f0f0f,transparent);
}

.marquee-text{
    white-space:nowrap;
    position:absolute;
    animation:marqueeMove 35s linear infinite;
    font-weight:500;
    color:#ff2d2d;
    padding-left:100%;
}

/* Hover dừng */
.marquee-box:hover .marquee-text{
    animation-play-state:paused;
}

@keyframes marqueeMove{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-100%); }
}

/* MOVIES */
.movie-container{
    padding:0 30px 40px 30px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
}
.movie-card{
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.movie-title{
    font-size:16px;
    margin-bottom:15px;
    min-height:40px;
}
.btn-group{
    display:flex;
    gap:10px;
}
.btn{
    padding:6px 12px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    border:none;
}
.thuyetminh{
    background:#e53935;
    color:#fff;
}
.vietsub{
    background:#1e88e5;
    color:#fff;
}

/* PAGINATION */
.pagination{
    text-align:center;
    padding-bottom:40px;
}
.page-btn{
    display:inline-block;
    margin:5px;
    padding:8px 14px;
    background:#2a2a2a;
    border-radius:6px;
    cursor:pointer;
}
.page-btn.active{
    background:#ff2d2d;
}

/* RESPONSIVE */
@media(max-width:1200px){
    .movie-container{ grid-template-columns:repeat(4,1fr); }
}
@media(max-width:900px){
    .movie-container{ grid-template-columns:repeat(3,1fr); }
    .slider-item{ min-width:33.33%; }
}
@media(max-width:600px){
    .movie-container{ grid-template-columns:repeat(2,1fr); }
    .slider-item{ min-width:50%; }
    .title-row{ flex-direction:column; align-items:flex-start; gap:10px; }
}
</style>
</head>

<body>

<header>
    <div class="logo">PHONG Movie</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm phim..." oninput="searchMovie()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
    </div>
</header>

<div class="slider-section">
    <div class="slider-wrapper">
        <div class="slider-track" id="sliderTrack"></div>
    </div>
</div>

<div class="title-row">
    <div class="section-title">Danh sách phim</div>
    <div class="marquee-box">
        <div class="marquee-text">
            Chào mừng bạn đến với Tủ phim của tôi 🎬 nếu xem phim thấy hay và mượt 🔥 hãy ủng hộ vào Số tài khoản 0705 86 0000 MB Bank 1 nghìn cũng quý 🎥 |
        </div>
    </div>
</div>

<div class="movie-container" id="movieContainer"></div>
<div class="pagination" id="pagination"></div>

<script>
let movies = [];
let filteredMovies = [];
let currentPage = 1;
let perPage = 15;

fetch("movies.json")
.then(res=>res.json())
.then(data=>{
    movies = data;
    filteredMovies = movies;
    renderSlider();
    renderMovies();
    renderPagination();
});

function renderSlider(){
    const track = document.getElementById("sliderTrack");
    track.innerHTML = "";
    let sliderMovies = movies.slice(0,10);
    let fullSlider = sliderMovies.concat(sliderMovies);

    fullSlider.forEach(movie=>{
        track.innerHTML += `
        <div class="slider-item">
            <img src="${movie.image}" 
                 onerror="this.src='images/default.jpg'">
        </div>
        `;
    });
}

function renderMovies(){
    const container = document.getElementById("movieContainer");
    container.innerHTML="";
    let start = (currentPage-1)*perPage;
    let end = start+perPage;
    let pageMovies = filteredMovies.slice(start,end);

    pageMovies.forEach(movie=>{
        container.innerHTML += `
        <div class="movie-card">
            <div class="movie-title">${movie.title}</div>
            <div class="btn-group">
                <button class="btn thuyetminh" onclick="window.location='${movie.thuyetMinh}'">Thuyết Minh</button>
                <button class="btn vietsub" onclick="window.location='${movie.vietsub}'">Vietsub</button>
            </div>
        </div>
        `;
    });
}

function renderPagination(){
    const totalPage = Math.ceil(filteredMovies.length/perPage);
    const pag = document.getElementById("pagination");
    pag.innerHTML="";
    for(let i=1;i<=totalPage;i++){
        pag.innerHTML += `
        <span class="page-btn ${i===currentPage?"active":""}" onclick="changePage(${i})">${i}</span>
        `;
    }
}

function changePage(page){
    currentPage=page;
    renderMovies();
    renderPagination();
    window.scrollTo({top:0,behavior:"smooth"});
}

function searchMovie(){
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    filteredMovies = movies.filter(movie =>
        movie.title.toLowerCase().includes(keyword)
    );
    currentPage = 1;
    renderMovies();
    renderPagination();
}
</script>

</body>
</html>
